<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce Chatbot Demo</title>

<style>
/* Page styling */
body {
  font-family: Arial, sans-serif;
  margin: 40px;
}

h1 { color: #333; }

/* Floating chat button */
#chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2e7d32;
  color: white;
  border: none;
  font-size: 22px;
  padding: 15px 18px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Chat window */
#chat-window {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: white;
  border-radius: 12px;
  border: 1px solid #ccc;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.chat-header {
  background: #2e7d32;
  color: white;
  padding: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

/* Messages area */
#chat-body {
  flex: 1;
  padding: 10px;
  background: #f5f5f5;
  overflow-y: auto;
}

/* Messages */
.user-msg {
  text-align: right;
  margin: 8px;
  padding: 8px 12px;
  background: #c8e6c9;
  border-radius: 15px;
  display: inline-block;
}

.bot-msg {
  text-align: left;
  margin: 8px;
  padding: 8px 12px;
  background: #eeeeee;
  border-radius: 15px;
  display: inline-block;
}

/* Input area */
.chat-input {
  display: flex;
  border-top: 1px solid #ccc;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.chat-input button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
}

.close-btn {
  cursor: pointer;
}
</style>
</head>

<body>

<h1>My Online Store 🛒</h1>
<p>Welcome! Ask anything about products, delivery, or returns.</p>

<!-- Floating Chat Button -->
<button id="chat-btn">💬</button>

<!-- Chat Window -->
<div id="chat-window">

  <div class="chat-header">
    IntelliCart Assistant 🤖
    <span id="close-btn" class="close-btn">✖</span>
  </div>

  <div id="chat-body"></div>

  <div class="chat-input">
    <input id="user-input" placeholder="Ask something..." />
    <button id="send-btn">Send</button>
  </div>

</div>

<script>
// Elements
const chatBtn = document.getElementById("chat-btn");
const chatWindow = document.getElementById("chat-window");
const closeBtn = document.getElementById("close-btn");
const sendBtn = document.getElementById("send-btn");
const userInput = document.getElementById("user-input");
const chatBody = document.getElementById("chat-body");

// Open chat
chatBtn.onclick = () => chatWindow.style.display = "flex";

// Close chat
closeBtn.onclick = () => chatWindow.style.display = "none";

// Send message on button click
sendBtn.onclick = sendMessage;

// Send on Enter key
userInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// Send message function
function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage(text, "user-msg");
  userInput.value = "";

  setTimeout(() => {
    const reply = getBotReply(text);
    addMessage(reply, "bot-msg");
  }, 500);
}

// Add message to chat
function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.className = className;
  msg.textContent = text;
  chatBody.appendChild(msg);
  chatBody.scrollTop = chatBody.scrollHeight;
}

// Static chatbot logic (demo)
function getBotReply(input) {
  input = input.toLowerCase();

  if (input.includes("price"))
    return "Prices start from ₹499 💰";

  if (input.includes("delivery") || input.includes("shipping"))
    return "Delivery takes 2–4 business days 🚚";

  if (input.includes("return"))
    return "7-day easy return available 🔄";

  if (input.includes("hello") || input.includes("hi"))
    return "Hello! How can I help you today? 😊";

  return "I can help with products, delivery, and orders 🤖";
}
</script>

</body>
</html>
